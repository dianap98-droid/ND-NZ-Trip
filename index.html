<!DOCTYPE html>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f6f1e9; --ink: #1a1a1a; --gold: #b07d3a; --gold-light: #dfc28a;
  --wedding: #b83a3a; --south: #2e6e5e; --north: #5a3a7e; --transit: #2a5070;
  --sidebar: 320px;
}
html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--ink); }
#header {
  height: 56px; background: var(--ink); color: var(--cream);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.4rem; border-bottom: 2px solid var(--gold);
  flex-shrink: 0; gap: 1rem; z-index: 1000; position: relative;
}
.h-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; line-height: 1; white-space: nowrap; }
.h-brand em { color: var(--gold-light); font-style: italic; }
.h-sub { font-size: 0.58rem; opacity: 0.45; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
.h-legend { display: flex; gap: 1rem; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 0.3rem; font-size: 0.65rem; opacity: 0.8; white-space: nowrap; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.leg-dot.north   { background: var(--north); }
.leg-dot.transit { background: var(--transit); }
.h-stats { display: flex; gap: 1.2rem; }

.hstat-val { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gold-light); line-height: 1; }
.hstat-lbl { font-size: 0.52rem; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.08em; }
#app { display: flex; height: calc(100vh - 56px); }
#sidebar {
  width: var(--sidebar); min-width: var(--sidebar); background: #fff;
  border-right: 1px solid #e4e0d8; display: flex; flex-direction: column; overflow: hidden; z-index: 500;
}
#sidebar-header { padding: 0.65rem 0.9rem; border-bottom: 1px solid #eee; flex-shrink: 0; background: var(--cream); }
#search {
  width: 100%; padding: 0.42rem 0.75rem; border: 1px solid #ddd; border-radius: 20px;

}
.sec-head.wedding { background: var(--wedding); }
.sec-head.south   { background: var(--south); }
.sec-head.transit { background: var(--transit); }
.sec-head.north   { background: var(--north); }
.sec-chevron { font-size: 0.7rem; transition: transform 0.2s; display: inline-block; }
.sec-head.collapsed .sec-chevron { transform: rotate(-90deg); }
.sec-body { overflow: hidden; transition: max-height 0.28s ease; }
.sec-body.collapsed { max-height: 0 !important; }
.card {
  padding: 0.52rem 0.9rem; border-bottom: 1px solid #f2f0ec; cursor: pointer;
  display: flex; gap: 0.55rem; align-items: flex-start; transition: background 0.1s;
}
.card:hover { background: #faf7f2; }
.card.active { background: #f0e9d8; border-left: 3px solid var(--gold); padding-left: calc(0.9rem - 3px); }
.card:last-child { border-bottom: none; }
.badge {
  width: 19px; height: 19px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 2px;
}
.badge.wedding { background: var(--wedding); }
.badge.south   { background: var(--south); }
.badge.north   { background: var(--north); }
.badge.transit { background: var(--transit); }
.ci { flex: 1; min-width: 0; }

.ctag { display: inline-block; font-size: 0.48rem; padding: 1px 4px; border-radius: 2px; color: #fff; vertical-align: middle; margin-left: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
.ctag.w { background: var(--wedding); }

.booked-badge { display: inline-block; background: #e8f5e8; color: #2a6a2a; font-size: 0.52rem; padding: 1px 4px; border-radius: 3px; font-style: normal; margin-left: 3px; vertical-align: middle; }
#map-wrap { flex: 1; position: relative; overflow: hidden; }
#map { width: 100%; height: 100%; }
.leaflet-container { font-family: 'Outfit', sans-serif; }
/* ── SIDEBAR TOGGLE ── */
#sidebar-toggle {
  display: none; position: absolute; top: 50%; left: 0;
  transform: translateY(-50%); z-index: 600;
  background: #fff; border: 1px solid #ddd; border-left: none;

/* ── MOBILE ── */
@media (max-width: 700px) {

  .h-stats { gap: 0.8rem; }

    position: absolute; left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; height: auto; max-height: 68vh;

    box-shadow: 0 -8px 32px rgba(0,0,0,0.15);

  }

    bottom: auto; top: 0.6rem; left: auto; right: 0.6rem;
    flex-direction: row; flex-wrap: wrap; justify-content: flex-end; max-width: 210px;
  }
  .ltbtn { font-size: 0.58rem; padding: 0.25rem 0.45rem; }
  .card { padding: 0.75rem 0.9rem; }
  .cname { font-size: 0.88rem; }
  .cnote { font-size: 0.72rem; }
  .mk-pin { width: 28px !important; height: 28px !important; font-size: 0.68rem !important; }
  .mk-pin.big { width: 34px !important; height: 34px !important; }
}
/* Marker styles */
.mk-outer { display: flex; flex-direction: column; align-items: center; }
.mk-pin {
  border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center;

/* Popup */

.leaflet-popup-content { margin: 0 !important; width: 230px !important; }

.pop-bar { height: 4px; }
.pop-body { padding: 0.8rem 1rem; }

.pop-dates { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.pop-accom { font-size: 0.68rem; color: #555; font-style: italic; margin-bottom: 4px; }

/* Detail panel */
#detail {
  position: absolute; right: 0; top: 0; bottom: 0; width: 300px; background: #fff;
  border-left: 1px solid #e0ddd8; box-shadow: -6px 0 28px rgba(0,0,0,0.1);

  transform: translateX(100%); transition: transform 0.25s cubic-bezier(.4,0,.2,1); overflow-y: auto;
}

  position: absolute; top: 0.7rem; right: 0.75rem; background: rgba(0,0,0,0.07); border: none;
  border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.75rem; color: #666; transition: background 0.1s;
}
.dp-close:hover { background: rgba(0,0,0,0.14); }

.dp-num { font-size: 0.57rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; }
.dp-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; line-height: 1.1; margin: 0.1rem 0; }
.dp-dates { font-size: 0.68rem; color: #aaa; margin-bottom: 0.9rem; }

.dp-accom-val { font-size: 0.78rem; color: var(--south); font-style: italic; }
.dp-booked { display: inline-block; background: #e8f5e8; color: #2a6a2a; font-size: 0.53rem; padding: 1px 5px; border-radius: 3px; font-style: normal; margin-left: 4px; vertical-align: middle; font-weight: 500; }
.dp-pending { display: inline-block; background: #fff3e0; color: #a06000; font-size: 0.53rem; padding: 1px 5px; border-radius: 3px; font-style: normal; margin-left: 4px; vertical-align: middle; font-weight: 500; }
/* Layer toggles */
#layer-ctrl {
  position: absolute; bottom: 1.5rem; left: 0.8rem; z-index: 400; display: flex; flex-direction: column; gap: 0.35rem;
}

  font-family: 'Outfit', sans-serif; font-size: 0.64rem; font-weight: 500; cursor: pointer;

</style>

<body>

<div id="header">
  <div>
    <div class="h-brand">Diana &amp; <em>Nikita</em></div>
    <div class="h-sub">New Zealand · Aug 10 – Oct 2, 2026</div>
  </div>
  <div class="h-legend">
    <div class="leg"><div class="leg-dot wedding"></div>Wedding/QTown</div>
    <div class="leg"><div class="leg-dot south"></div>South Island</div>
    <div class="leg"><div class="leg-dot north"></div>North Island</div>
    <div class="leg"><div class="leg-dot transit"></div>Transit</div>
  </div>
  <div class="h-stats">
    <div class="hstat"><div class="hstat-val">54</div><div class="hstat-lbl">Days</div></div>
    <div class="hstat"><div class="hstat-val">25</div><div class="hstat-lbl">Stops</div></div>
    <div class="hstat"><div class="hstat-val">Aug 14</div><div class="hstat-lbl">Wedding 💍</div></div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <input id="search" type="text" placeholder="🔍  Search stops, notes, dates…">
    </div>
    <div id="sidebar-list"></div>
  </div>

    <button id="sidebar-toggle" aria-label="Toggle sidebar">
      <span class="tog-arrow">‹</span>
    </button>

      <div class="dp-bar" id="dp-bar"></div>

      <button class="ltbtn on" id="btn-routes" onclick="toggleRoutes()"><div class="ltdot" style="background:#888"></div>Routes</button>
    </div>
  </div>
</div>

<script>
const COLORS = { wedding:'#b83a3a', south:'#2e6e5e', north:'#5a3a7e', transit:'#2a5070' };
const SEC_LABELS = { wedding:'Wedding & Queenstown', south:'South Island', transit:'Transit / Flights', north:'North Island' };

// ── GOOGLE SHEET CONFIG ───────────────────────────────────────────
// The map reads your live Google Sheet on every load.
// To update the map: just edit the Google Sheet — no code needed!
const SHEET_ID = "1zncGyQcktACLKglDwekUqF2EjwmTXAVJZDnn8GCX8Ow";
const SHEET_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

// ── COORDINATES + METADATA (fixed — not in sheet) ────────────────
// Keyed by the "Overnight" value from the sheet
const STOP_META = {
  "Queenstown":              { n:1,  lat:-45.031, lng:168.663, short:"Queenstown",        type:"wedding" },
  "Manapouri":               { n:2,  lat:-45.568, lng:167.616, short:"Manapouri",          type:"south"   },
  "Doubtful Sound":          { n:3,  lat:-45.430, lng:167.107, short:"Doubtful Sound",     type:"south"   },
  "Te Anau accommodation":   { n:4,  lat:-45.415, lng:167.719, short:"Te Anau",            type:"south"   },
  "The Catlins - Slope Point/Curio Bay": { n:5, lat:-46.683, lng:169.133, short:"Curio Bay",  type:"south" },
  "The Catlins - Kaka Point":{ n:6,  lat:-46.356, lng:169.838, short:"Kaka Point",         type:"south"   },
  "Dunedin":                 { n:7,  lat:-45.879, lng:170.504, short:"Dunedin",             type:"south"   },
  "Aoraki/Mt Cook- Twizel":  { n:8,  lat:-44.259, lng:170.104, short:"Twizel / Mt Cook",   type:"south"   },
  "Lake Tekapo":             { n:9,  lat:-44.004, lng:170.483, short:"Lake Tekapo",         type:"south"   },
  "Christchurch":            { n:10, lat:-43.533, lng:172.634, short:"Christchurch",        type:"south"   },
  "Kaikōura":                { n:11, lat:-42.399, lng:173.681, short:"Kaikōura",            type:"south"   },
  "Blenheim/Picton":         { n:12, lat:-41.513, lng:173.961, short:"Blenheim",            type:"south"   },
  "Kaiteriteri - Abel Tasman":{ n:13, lat:-40.993, lng:172.999, short:"Kaiteriteri",        type:"south"   },
  "Hokitika":                { n:14, lat:-42.716, lng:170.975, short:"Hokitika",            type:"south"   },
  "Franz Josef/Fox":         { n:15, lat:-43.388, lng:170.183, short:"Franz Josef/Fox",     type:"south"   },
  "Wānaka":                  { n:16, lat:-44.701, lng:169.132, short:"Wānaka",              type:"south"   },
  "Auckland":                { n:17, lat:-45.021, lng:168.741, short:"Flight → AKL",        type:"transit", isFlightStop:true },
  "Coromandel":              { n:18, lat:-36.758, lng:175.491, short:"Coromandel",          type:"north"   },
  "Rotorua":                 { n:19, lat:-38.137, lng:176.252, short:"Rotorua",             type:"north"   },
  "Taupō":                   { n:20, lat:-38.685, lng:176.070, short:"Taupō",               type:"north"   },
  "Auckland area - practical":{ n:21, lat:-36.952, lng:174.756, short:"Auckland",           type:"north"   },
  "Paihia":                  { n:22, lat:-35.281, lng:174.091, short:"Bay of Islands",      type:"north"   },
  "Kai Iwi Lakes or around Mangawhai":{ n:23, lat:-36.132, lng:174.579, short:"Mangawhai",  type:"north"   },
  "Mangawhai":               { n:23, lat:-36.132, lng:174.579, short:"Mangawhai",           type:"north"   },
  "Auckland ":               { n:24, lat:-36.848, lng:174.763, short:"Auckland",            type:"north"   },
};

// STOPS is declared below as const with fallback data.
// init() replaces its contents from the Google Sheet on load.

// ── CSV PARSER ────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur.trim()); rows.push(row); row = []; cur = '';
    } else cur += c;
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

// ── DATE FORMATTER ────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  // "10 August 2026" → "Aug 10"
  const m = d.match(/(\d+)\s+(\w+)\s+(\d+)/);
  if (!m) return d;
  const months = {January:'Jan',February:'Feb',March:'Mar',April:'Apr',May:'May',June:'Jun',
    July:'Jul',August:'Aug',September:'Sep',October:'Oct',November:'Nov',December:'Dec'};
  return `${months[m[2]]||m[2]} ${m[1]}`;
}

// ── BUILD STOPS FROM SHEET ────────────────────────────────────────
function buildStopsFromCSV(rows) {
  // header row: Dates, Notes, Overnight, Accommodations (Link), Cancel By Date, Food Recommendations
  const stops = [];
  const seen = {}; // overnight → stop (for merging consecutive same-location days)

  for (let i = 1; i < rows.length; i++) {
    const [dateStr, notes, overnight, accom, cancelBy, food] = rows[i];
    if (!overnight || overnight.trim() === '') continue;
    const key = overnight.trim();

    // Find matching meta
    let meta = STOP_META[key];
    // Fuzzy match if exact not found
    if (!meta) {
      const k = Object.keys(STOP_META).find(k => key.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(key.toLowerCase()));
      if (k) meta = STOP_META[k];
    }
    if (!meta) continue; // skip rows we can't geo-locate

    const date = fmtDate(dateStr);

    if (seen[key]) {
      // Extend existing stop
      const s = seen[key];
      s.nights++;
      s.dates = s.dates.split('–')[0] + '–' + date;
      if (notes && notes.trim()) s.note += (s.note ? '\n' : '') + notes.trim();
      if (accom && accom.trim() && !s.accom) s.accom = accom.trim();
      if (food && food.trim()) s.food = (s.food ? s.food + ', ' : '') + food.trim();
    } else {
      const s = {
        ...meta,
        name: key,
        dates: date,
        nights: 1,
        note: notes ? notes.trim() : '',
        accom: accom ? accom.replace(/\n/g,' ').trim() : '',
        food: food ? food.trim() : '',
        cancelBy: cancelBy ? cancelBy.trim() : '',
        booked: accom && (accom.includes('PAID') || accom.includes('✅') || accom.includes('Booked')),
      };
      if (s.food) s.note += (s.note ? '\n' : '') + '🍽 Food: ' + s.food;
      seen[key] = s;
      stops.push(s);
    }
  }

  // Sort by stop number
  stops.sort((a, b) => a.n - b.n);
  return stops;
}

const mrkrs={};

function mkIcon(s) {
  const big = s.n===1;
  const sz = big?30:24;
  const cls = `mk-pin ${s.type}${big?' big':''}`;
  const html = `<div class="mk-outer"><div class="${cls}" id="pin-${s.n}">${s.n}</div><div class="mk-lbl">${s.short}</div></div>`;
  return L.divIcon({ html, className:'', iconSize:[70, big?52:46], iconAnchor:[sz/2, big?36:30], popupAnchor:[0,-32] });
}

function drawMarkers() {
  Object.values(mrkrs).forEach(m => map.removeLayer(m));
  Object.keys(mrkrs).forEach(k => delete mrkrs[k]);
  southMrks.length = 0; northMrks.length = 0;
  STOPS.forEach(s=>{
    const mk = L.marker([s.lat,s.lng],{icon:mkIcon(s), zIndexOffset:s.n===1?1000:0});
    const col = COLORS[s.type];
    const pop = `<div class="pop-bar" style="background:${col}"></div>
      <div class="pop-body">
        <h3>${s.name.replace('✈ ','').replace(' 🎂','')}</h3>
        <div class="pop-dates" style="color:${col}">${s.dates}${s.nights>0?' · '+s.nights+' night'+(s.nights!==1?'s':''):''}</div>
        ${s.accom?`<div class="pop-accom">🏠 ${s.accom}</div>`:''}
        <div class="pop-note">${s.note.replace(/\n/g,' ').substring(0,120)}${s.note.length>120?'…':''}</div>
        <div class="pop-hint">Click for full details →</div>
      </div>`;
    mk.bindPopup(pop,{maxWidth:240,className:'nzpop',autoPan:false});
    mk.on('mouseover',function(){this.openPopup();});
    mk.on('mouseout', function(){this.closePopup();});
    mk.on('click',function(){activateStop(s.n);});
    mk.addTo(map);
    mrkrs[s.n]=mk;
    if(s.type==='south'||s.type==='wedding') southMrks.push(mk);
    if(s.type==='north') northMrks.push(mk);
  });
} // end drawMarkers()

async function fetchRealRoutes() {
  const statusEl = document.createElement('div');
  statusEl.id = 'route-status';
  statusEl.style.cssText = 'position:absolute;bottom:5rem;left:0.8rem;z-index:1000;background:rgba(28,28,28,0.8);color:#fff;font-size:0.62rem;padding:0.3rem 0.65rem;border-radius:5px;font-family:Outfit,sans-serif;';
  statusEl.textContent = '⟳ Loading road routes…';
  document.getElementById('map-wrap').appendChild(statusEl);

  let loaded = 0;
  for (const seg of ROUTE_SEGS) {
    const [flng, flat, tlng, tlat, type] = seg;
    const url = `https://router.project-osrm.org/route/v1/driving/${flng},${flat};${tlng},${tlat}?overview=full&geometries=geojson`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.routes && data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        const line = L.polyline(coords, {
          color: COLORS[type],
          weight: 2.4,
          opacity: 0.65,
          dashArray: '6 5',
        });
        if (routesOn) line.addTo(map);
        if (type === 'south') southLines.push(line);
        else northLines.push(line);
      }
    } catch(e) { /* silently skip failed segments */ }
    loaded++;
    statusEl.textContent = `⟳ Loading routes… ${loaded}/${ROUTE_SEGS.length}`;
    await new Promise(r => setTimeout(r, 80));
  }

  // Remove placeholders, show real routes
  map.removeLayer(_southPlaceholder);
  map.removeLayer(_northPlaceholder);
  routesLoaded = true;
  statusEl.textContent = '✓ Road routes loaded';
  setTimeout(() => statusEl.remove(), 2000);
}

fetchRealRoutes();

function toggleRoutes() {
  routesOn = !routesOn;
  [...southLines, ...northLines].forEach(l => routesOn ? l.addTo(map) : map.removeLayer(l));
  if (flightLine) routesOn ? flightLine.addTo(map) : map.removeLayer(flightLine);
  if (!routesLoaded) {
    if(_southPlaceholder) routesOn ? _southPlaceholder.addTo(map) : map.removeLayer(_southPlaceholder);
    if(_northPlaceholder) routesOn ? _northPlaceholder.addTo(map) : map.removeLayer(_northPlaceholder);
  }
  document.getElementById('btn-routes').classList.toggle('on', routesOn);
}

function toggleLayer(which) {
  if(which==='south'){
    southOn=!southOn;
    southMrks.forEach(m=>southOn?m.addTo(map):map.removeLayer(m));
    southLines.forEach(l=>southOn?l.addTo(map):map.removeLayer(l));
    if(!routesLoaded)(southOn?_southPlaceholder.addTo(map):map.removeLayer(_southPlaceholder));
    document.getElementById('btn-south').classList.toggle('on',southOn);
  } else {
    northOn=!northOn;
    northMrks.forEach(m=>northOn?m.addTo(map):map.removeLayer(m));
    northLines.forEach(l=>northOn?l.addTo(map):map.removeLayer(l));
    if(!routesLoaded)(northOn?_northPlaceholder.addTo(map):map.removeLayer(_northPlaceholder));
    document.getElementById('btn-north').classList.toggle('on',northOn);
  }
}

  secs.forEach(sec=>{
    const fl=q?sec.stops.filter(s=>
      s.name.toLowerCase().includes(q)||
      s.note.toLowerCase().includes(q)||
      s.dates.toLowerCase().includes(q)||
      (s.accom||'').toLowerCase().includes(q)):sec.stops;
    if(!fl.length) return;
    const wrap=document.createElement('div');
    const hd=document.createElement('div');
    hd.className=`sec-head ${sec.key}`;
    hd.innerHTML=`<span>${SEC_LABELS[sec.key]}</span><span class="sec-chevron">▾</span>`;
    const body=document.createElement('div');
    body.className='sec-body'; body.style.maxHeight='3000px'; body.id='sb-'+sec.key;
    hd.addEventListener('click',()=>{
      const c=hd.classList.toggle('collapsed');
      body.classList.toggle('collapsed',c);
      if(!c) body.style.maxHeight=(body.scrollHeight+2000)+'px';
    });
    fl.forEach(s=>{
      const card=document.createElement('div');
      card.className='card'; card.dataset.n=s.n;
      let tags='';
      if(s.n===1) tags+=`<span class="ctag w">💍 Wedding</span>`;
      if(s.dates.includes('🎂')) tags+=`<span class="ctag b">🎂 Birthday</span>`;
      card.innerHTML=`
        <div class="badge ${s.type}">${s.n}</div>
        <div class="ci">
          <div class="cname">${s.name.replace('✈ ','').replace(' 🎂','')}${tags}</div>
          <div class="cdates">${s.dates}${s.nights>0?' · '+s.nights+' night'+(s.nights!==1?'s':''):''}</div>
          <div class="cnote">${s.note.replace(/\n/g,' ')}</div>
          ${s.accom?`<div class="caccom">🏠 ${s.accom.replace(' (PAID)','')}${s.booked?'<span class="booked-badge">✅</span>':''}</div>`:''}
        </div>`;
      card.addEventListener('click',()=>activateStop(s.n));
      body.appendChild(card);
    });
    wrap.appendChild(hd); wrap.appendChild(body); list.appendChild(wrap);
  });
}

// ── DETAIL ───────────────────────────────────────────────────────
function openDetail(s) {
  document.getElementById('dp-bar').style.background=COLORS[s.type];
  const booked=s.booked
    ?'<span class="dp-booked">✅ booked</span>'
    :'<span class="dp-pending">⏳ pending</span>';
  document.getElementById('dp-inner').innerHTML=`
    <div class="dp-num">Stop ${s.n} of ${STOPS.length}</div>
    <div class="dp-name">${s.name.replace('✈ ','').replace(' 🎂','')}</div>
    <div class="dp-dates">${s.dates}${s.nights>0?' &nbsp;·&nbsp; '+s.nights+' night'+(s.nights!==1?'s':''):''}</div>
    ${s.accom?`<div class="dp-sect"><div class="dp-lbl">Accommodation</div><div class="dp-accom-val">🏠 ${s.accom} ${booked}</div></div>`:''}
    <div class="dp-sect"><div class="dp-lbl">Notes & Activities</div><div class="dp-val">${s.note.replace(/\n/g,'<br>')}</div></div>`;
  document.getElementById('detail').classList.add('open');
}

document.getElementById('dp-close').addEventListener('click',()=>{
  document.getElementById('detail').classList.remove('open');
  clearActive();
});

// ── ACTIVATE ─────────────────────────────────────────────────────
function activateStop(n) {
  const s=STOPS.find(x=>x.n===n); if(!s) return;
  document.querySelectorAll('.card').forEach(el=>el.classList.toggle('active',+el.dataset.n===n));
  const card=document.querySelector(`.card[data-n="${n}"]`);
  if(card) card.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.querySelectorAll('.mk-pin').forEach(el=>el.classList.remove('hl'));
  const pin=document.getElementById(`pin-${n}`);
  if(pin) pin.classList.add('hl');
  map.flyTo([s.lat,s.lng],Math.max(map.getZoom(),9),{duration:0.7});
  openDetail(s);
  // On mobile: close sidebar so map is visible after selecting a stop
  if(isMobile()) closeSidebar();
}
function clearActive() {
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.mk-pin').forEach(el=>el.classList.remove('hl'));
}
map.on('click',clearActive);

document.getElementById('search').addEventListener('input',function(){
  buildSidebar(this.value.toLowerCase().trim());
});

// ── MOBILE SIDEBAR TOGGLE ─────────────────────────────────────────
const togBtn     = document.getElementById('sidebar-toggle');
const sidebar    = document.getElementById('sidebar');
const mobOverlay = document.getElementById('mob-overlay');

function isMobile() { return window.innerWidth <= 700; }

function openSidebar() {
  sidebar.classList.add('mob-open');
  mobOverlay.classList.add('show');
  togBtn.classList.add('sidebar-open');
}
function closeSidebar() {
  sidebar.classList.remove('mob-open');
  mobOverlay.classList.remove('show');
  togBtn.classList.remove('sidebar-open');
}
function toggleSidebar() {
  sidebar.classList.contains('mob-open') ? closeSidebar() : openSidebar();
}

togBtn.addEventListener('click', e => { e.stopPropagation(); toggleSidebar(); });
mobOverlay.addEventListener('click', closeSidebar);

// ── BOOT ─────────────────────────────────────────────────────────
// Fetches live data from Google Sheet, then builds the map
init();
</script>
</body>
</html>
