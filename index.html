<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana & Nikita – New Zealand 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f0e8; --ink: #1a1a1a; --gold: #c9a84c; --gold-light: #e8d5a0;
  --south: #4a7c6f; --north: #7c4a6f; --wedding: #c94a4a; --transit: #4a6f7c;
  --sea: #cce0ec; --land: #daebd5; --land-stroke: #a8c9a0;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow: hidden; }

/* HEADER */
header { background: var(--ink); color: var(--cream); padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; line-height: 1; }
header h1 span { color: var(--gold); font-style: italic; }
.header-sub { font-size: 0.78rem; opacity: 0.6; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.2rem; }
.header-right { text-align: right; }
.header-tagline { color: var(--gold); font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; }
.header-hint { font-size: 0.72rem; opacity: 0.55; margin-top: 0.2rem; }

/* LEGEND */
.legend { display: flex; gap: 1.2rem; padding: 0.55rem 2rem; background: var(--ink); border-bottom: 1px solid #333; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 0.4rem; color: var(--cream); font-size: 0.74rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 95px); }

/* SIDEBAR */
.sidebar { background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }

.sec-head { position: sticky; top: 0; z-index: 5; padding: 0.5rem 0.9rem; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.sec-head.wedding { background: var(--wedding); color: #fff; }
.sec-head.south   { background: var(--south);   color: #fff; }
.sec-head.transit { background: var(--transit); color: #fff; }
.sec-head.north   { background: var(--north);   color: #fff; }

.stop-card { padding: 0.65rem 0.9rem; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; gap: 0.6rem; align-items: flex-start; transition: background 0.1s; }
.stop-card:hover  { background: #fafaf5; }
.stop-card.active { background: #f2ece0; }

.snum { min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px; }
.snum.wedding { background: var(--wedding); }
.snum.south   { background: var(--south); }
.snum.north   { background: var(--north); }
.snum.transit { background: var(--transit); }

.sinfo { flex: 1; min-width: 0; }
.sname  { font-weight: 500; font-size: 0.84rem; }
.sdates { font-size: 0.7rem; color: #999; margin: 0.1rem 0; }
.snote  { font-size: 0.72rem; color: #666; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.wtag   { display: inline-block; background: var(--wedding); color: #fff; font-size: 0.55rem; padding: 1px 4px; border-radius: 2px; letter-spacing: 0.04em; text-transform: uppercase; margin-left: 4px; vertical-align: middle; }

/* MAP */
#map-wrap { position: relative; background: var(--sea); overflow: hidden; }
#map-svg  { width: 100%; height: 100%; display: block; }
.nz-land  { fill: var(--land); stroke: var(--land-stroke); stroke-width: 0.7; }
.route-line   { fill: none; stroke-width: 1.8; stroke-dasharray: 5 4; opacity: 0.7; pointer-events: none; }
.route-south  { stroke: var(--south); }
.route-north  { stroke: var(--north); }
.route-flight { stroke: var(--transit); stroke-dasharray: 3 7; stroke-width: 1.4; opacity: 0.6; }

/* TOOLTIP */
#tip { position: absolute; background: var(--ink); color: var(--cream); padding: 0.8rem 1rem; border-radius: 7px; max-width: 230px; pointer-events: none; display: none; z-index: 500; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-left: 3px solid var(--gold); font-size: 0.8rem; line-height: 1.45; }
#tip h3 { font-family: 'Playfair Display', serif; font-size: 0.92rem; margin-bottom: 0.15rem; }
#tip .td { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.35rem; }
#tip .th { margin-top: 0.35rem; font-size: 0.62rem; opacity: 0.45; }

/* ADD BUTTON */
.add-btn { position: absolute; bottom: 1rem; right: 1rem; background: var(--gold); color: var(--ink); border: none; border-radius: 40px; padding: 0.6rem 1.2rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; box-shadow: 0 3px 14px rgba(0,0,0,0.18); z-index: 50; transition: transform 0.15s; }
.add-btn:hover { transform: translateY(-2px); }

/* LOADING */
.loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--sea); z-index: 300; }
.loading p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--south); }

/* ═══════════════════════════════════════════════════════
   MODAL — fixed position, highest z-index, fully isolated
   ═══════════════════════════════════════════════════════ */
#modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 999999;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

#modal-box {
  background: #ffffff;
  border-radius: 12px;
  padding: 1.8rem;
  width: 460px;
  max-width: 94vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 70px rgba(0,0,0,0.35);
  position: relative;
  z-index: 1000000;
  /* Ensure nothing can block interactions */
  pointer-events: auto;
  isolation: isolate;
}
#modal-box h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 1.2rem; border-bottom: 2px solid var(--gold); padding-bottom: 0.4rem; }

.fg { margin-bottom: 0.85rem; }
.fg label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #777; margin-bottom: 0.22rem; }

/* Inputs — explicitly interactive */
.fg input,
.fg textarea,
.fg select {
  display: block;
  width: 100%;
  border: 1.5px solid #d5d5d5;
  border-radius: 6px;
  padding: 0.5rem 0.7rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.86rem;
  color: #1a1a1a;
  background: #fafafa;
  outline: none;
  cursor: text;
  pointer-events: auto !important;
  user-select: text !important;
  -webkit-user-select: text !important;
  position: relative;
  z-index: 1;
}
.fg input:focus,
.fg textarea:focus { border-color: var(--gold); background: #fff; }
.fg select { cursor: pointer; }
.fg textarea { min-height: 80px; resize: vertical; }

.mactions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.2rem; }
.btn { padding: 0.5rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 500; pointer-events: auto !important; }
.btn-save   { background: var(--ink); color: #fff; }
.btn-cancel { background: #eeeeee; color: var(--ink); }
.btn-del    { background: #fff0f0; color: var(--wedding); border: 1.5px solid #f0b0b0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Diana & <span>Nikita</span></h1>
    <div class="header-sub">New Zealand · Aug 10 – Oct 2, 2026</div>
  </div>
  <div class="header-right">
    <div class="header-tagline">7.5 weeks · 2 islands · 1 wedding</div>
    <div class="header-hint">Hover to preview · Double-click any pin or card to edit · Scroll to zoom</div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--wedding)"></div>Queenstown &amp; Wedding</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--south)"></div>South Island</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--north)"></div>North Island</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--transit)"></div>Flights / Transit</div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div id="map-wrap">
    <div class="loading" id="loading"><p>Loading New Zealand map…</p></div>
    <svg id="map-svg"></svg>
    <div id="tip"></div>
    <button class="add-btn" onclick="openAdd()">+ Add Stop</button>
  </div>
</div>

<!-- MODAL: lives at <body> root, fixed position, nothing can block it -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Edit Stop</h2>
    <div class="fg">
      <label for="f-name">Location Name</label>
      <input type="text" id="f-name" autocomplete="off" />
    </div>
    <div class="fg">
      <label for="f-dates">Dates</label>
      <input type="text" id="f-dates" placeholder="e.g. Aug 12–22" autocomplete="off" />
    </div>
    <div class="fg">
      <label for="f-type">Category</label>
      <select id="f-type">
        <option value="wedding">💒 Wedding / Queenstown</option>
        <option value="south">🏔 South Island</option>
        <option value="north">🌿 North Island</option>
        <option value="transit">✈ Transit / Flight</option>
      </select>
    </div>
    <div class="fg">
      <label for="f-notes">Notes &amp; Activities</label>
      <textarea id="f-notes" rows="4"></textarea>
    </div>
    <div class="mactions">
      <button class="btn btn-del"    id="del-btn"    onclick="doDelete()">Delete Stop</button>
      <button class="btn btn-cancel"                 onclick="closeModal()">Cancel</button>
      <button class="btn btn-save"                   onclick="doSave()">Save</button>
    </div>
  </div>
</div>

<script>
// ── SHEET CONFIG ──────────────────────────────────────────────────────────────
const SHEET_ID = '1ZJ7k0qNxnfkXt3o_pGPdAmY_EbWWLdX7O1DqTDPLfms';
const SHEET_GID = '0';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

// ── COORDINATES LOOKUP ────────────────────────────────────────────────────────
// Maps Overnight cell values (lowercase, trimmed) → [lon, lat, type]
const COORDS = {
  'queenstown':                        [168.6626, -45.0312, 'wedding'],
  'manapouri':                         [167.6167, -45.5667, 'south'],
  'doubtful sound':                    [167.0,    -45.5,    'south'],
  'te anau':                           [167.7191, -45.4153, 'south'],
  'te anau accommodation':             [167.7191, -45.4153, 'south'],
  'curio bay':                         [169.43,   -46.55,   'south'],
  'accommodation at curio':            [169.43,   -46.55,   'south'],
  'kaka point':                        [169.86,   -46.39,   'south'],
  'dunedin':                           [170.5028, -45.8788, 'south'],
  'twizel':                            [170.0994, -44.2518, 'south'],
  'lake tekapo':                       [170.4776, -44.0053, 'south'],
  'tekapo':                            [170.4776, -44.0053, 'south'],
  'christchurch':                      [172.6362, -43.5321, 'south'],
  'kaikōura':                          [173.6833, -42.4,    'south'],
  'kaikoura':                          [173.6833, -42.4,    'south'],
  'blenheim':                          [173.9612, -41.5134, 'south'],
  'kaiteriteri':                       [173.05,   -41.03,   'south'],
  'abel tasman':                       [173.05,   -41.03,   'south'],
  'hokitika':                          [170.9624, -42.7163, 'south'],
  'franz josef':                       [170.1833, -43.45,   'south'],
  'fox glacier':                       [170.0145, -43.4632, 'south'],
  'wānaka':                            [169.1417, -44.7,    'south'],
  'wanaka':                            [169.1417, -44.7,    'south'],
  'hawea':                             [169.244,  -44.6,    'south'],
  'hawea hotel':                       [169.244,  -44.6,    'south'],
  'dubai airport lounge':              [55.3644,  25.2532,  'transit'],
  'auckland':                          [174.7633, -36.8785, 'north'],
  'coromandel':                        [175.5,    -36.75,   'north'],
  'hahei':                             [175.78,   -36.87,   'north'],
  'cathedral cove':                    [175.78,   -36.87,   'north'],
  'rotorua':                           [176.2497, -38.1368, 'north'],
  'taupō':                             [176.0702, -38.6857, 'north'],
  'taupo':                             [176.0702, -38.6857, 'north'],
  'paihia':                            [174.0879, -35.2792, 'north'],
  'bay of islands':                    [174.0879, -35.2792, 'north'],
  'kai iwi':                           [174.06,   -36.1,    'north'],
  'mangawhai':                         [174.57,   -36.13,   'north'],
};

// Fuzzy coord lookup — tries exact, then partial match
function lookupCoords(overnight) {
  if (!overnight) return null;
  const key = overnight.toLowerCase().trim();
  if (COORDS[key]) return COORDS[key];
  for (const [k, v] of Object.entries(COORDS)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  return null;
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; continue; }
    if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur.trim()); rows.push(row); row = []; cur = ''; continue;
    }
    cur += c;
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

// ── BUILD STOPS FROM CSV ──────────────────────────────────────────────────────
// Columns: A=Dates, B=Notes, C=Overnight, D=Accommodations, E=CancelBy, F=Food
function buildStops(rows) {
  // Skip header row
  const data = rows.slice(1).filter(r => r.length >= 3);
  const groups = [];
  let current = null;

  for (const r of data) {
    const date   = (r[0] || '').trim();
    const notes  = (r[1] || '').trim();
    const over   = (r[2] || '').trim();
    const accom  = (r[3] || '').trim();
    const cancel = (r[4] || '').trim();
    const food   = (r[5] || '').trim();

    if (!over) continue; // skip rows with no overnight location

    if (current && current.overnight.toLowerCase() === over.toLowerCase()) {
      // Same location — accumulate
      if (notes) current.notesList.push(notes);
      if (food && !current.food.includes(food)) current.food.push(food);
      if (cancel) current.cancel = cancel;
      current.lastDate = date;
    } else {
      // New location
      if (current) groups.push(current);
      current = {
        overnight: over,
        accom: accom,
        firstDate: date,
        lastDate: date,
        notesList: notes ? [notes] : [],
        food: food ? [food] : [],
        cancel: cancel,
      };
    }
  }
  if (current) groups.push(current);

  // Convert groups → stops
  return groups.map((g, i) => {
    const coords = lookupCoords(g.overnight);
    const [lon, lat, type] = coords || [172.0, -41.5, 'south'];
    const dateStr = g.firstDate === g.lastDate
      ? g.firstDate
      : `${g.firstDate} – ${g.lastDate}`;
    const notesStr = g.notesList.join(' · ');
    const foodStr  = g.food.length ? '🍴 ' + g.food.join(', ') : '';
    return {
      id: i + 1,
      name: g.overnight,
      dates: dateStr,
      type,
      lon, lat,
      accom: g.accom,
      cancel: g.cancel,
      notes: [notesStr, foodStr].filter(Boolean).join('  '),
    };
  });
}

// ── DATA STATE ────────────────────────────────────────────────────────────────
let stops = [];
let nextId = 1;
let clickTimer = null;
let activeId = null;
let editingId = null;

const TC = { wedding:'#c94a4a', south:'#4a7c6f', north:'#7c4a6f', transit:'#4a6f7c' };

// ── D3 MAP ────────────────────────────────────────────────────────────────────
const mapWrap = document.getElementById('map-wrap');
const svg = d3.select('#map-svg');
let g, projection, pathGen, gLand, gRoutes, gMarkers;

function sz() { return { w: mapWrap.clientWidth || 800, h: mapWrap.clientHeight || 600 }; }

function initMap() {
  const { w, h } = sz();
  svg.attr('width', w).attr('height', h);
  projection = d3.geoMercator()
    .center([172.0, -41.8])
    .scale(Math.min(w, h) * 2.2)
    .translate([w/2, h/2]);
  pathGen = d3.geoPath().projection(projection);
  g        = svg.append('g');
  gLand    = g.append('g');
  gRoutes  = g.append('g');
  gMarkers = g.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.4, 25])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  svg.on('dblclick.zoom', null); // prevent D3 hijacking dblclick
}

async function loadMap() {
  let world;
  for (const url of [
    'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json',
    'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
  ]) {
    try { world = await d3.json(url); break; } catch(e) {}
  }
  if (!world) { document.getElementById('loading').innerHTML = '<p style="color:#c94a4a">Map failed to load.<br>Check your internet connection.</p>'; return; }
  const all = topojson.feature(world, world.objects.countries);
  const nz  = all.features.filter(f => +f.id === 554);
  gLand.selectAll('path').data(nz).enter().append('path').attr('class','nz-land').attr('d', pathGen);
  document.getElementById('loading').style.display = 'none';
  render();
}

function renderRoutes() {
  gRoutes.selectAll('*').remove();
  const line = d3.line().x(d=>d[0]).y(d=>d[1]).curve(d3.curveCatmullRom.alpha(0.5));
  const p = s => projection([s.lon, s.lat]);
  const sa = stops.filter(s => s.type==='south' || s.type==='wedding');
  const na = stops.filter(s => s.type==='north');
  const tr = stops.find(s => s.type==='transit');
  if (sa.length > 1) gRoutes.append('path').attr('class','route-line route-south').attr('d', line(sa.map(p)));
  if (tr && sa.length) {
    const [lx,ly]=p(sa[sa.length-1]), [tx,ty]=p(tr);
    gRoutes.append('path').attr('class','route-line route-flight').attr('d',`M${lx},${ly} Q${(lx+tx)/2-40},${Math.min(ly,ty)-50} ${tx},${ty}`);
  }
  if (tr && na.length) {
    const [tx,ty]=p(tr), [n0x,n0y]=p(na[0]);
    gRoutes.append('path').attr('class','route-line route-north').attr('d',`M${tx},${ty}L${n0x},${n0y}`);
    if (na.length>1) gRoutes.append('path').attr('class','route-line route-north').attr('d', line(na.map(p)));
  }
}

function renderMarkers() {
  gMarkers.selectAll('*').remove();
  let n = 0;
  ['wedding','south','transit','north'].forEach(type => {
    stops.filter(s=>s.type===type).forEach(s => {
      if (type!=='transit') n++;
      const label = type==='wedding'?'💒': type==='transit'?'✈': String(n);
      const [px,py] = projection([s.lon, s.lat]);
      const r = type==='wedding' ? 11 : 8;
      const active = s.id === activeId;
      const grp = gMarkers.append('g')
        .style('cursor','pointer')
        .on('click', () => { clearTimeout(clickTimer); clickTimer = setTimeout(() => selectStop(s.id), 220); })
        .on('dblclick', evt => { evt.stopPropagation(); clearTimeout(clickTimer); openEdit(s.id); })
        .on('mouseenter', evt => showTip(evt, s.id))
        .on('mouseleave', hideTip);
      grp.append('circle')
        .attr('cx',px).attr('cy',py).attr('r', active ? r+3 : r)
        .attr('fill', TC[type])
        .attr('stroke','#fff').attr('stroke-width', 2.5)
        .style('filter','drop-shadow(0 2px 4px rgba(0,0,0,0.4))');
      grp.append('text')
        .attr('x',px).attr('y',py)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-size', type==='wedding'||type==='transit' ? 11 : 9)
        .attr('font-weight','700').attr('fill','#fff')
        .style('pointer-events','none')
        .text(label);
    });
  });
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const sections = [
    { key:'wedding', label:'💍 Queenstown & Wedding', types:['wedding'] },
    { key:'south',   label:'🏔 South Island',          types:['south']   },
    { key:'transit', label:'✈️ Fly to North Island',   types:['transit'] },
    { key:'north',   label:'🌿 North Island',           types:['north']   },
  ];
  let n = 0;
  el.innerHTML = sections.map(sec => {
    const items = stops.filter(s => sec.types.includes(s.type));
    if (!items.length) return '';
    return `<div class="sec-head ${sec.key}">${sec.label}</div>` +
      items.map(s => {
        if (sec.key !== 'transit') n++;
        const num = sec.key === 'transit' ? '✈' : n;
        return `<div class="stop-card${s.id===activeId?' active':''}" onclick="selectStop(${s.id})" ondblclick="openEdit(${s.id})" title="Double-click to edit">
          <div class="snum ${s.type}">${num}</div>
          <div class="sinfo">
            <div class="sname">${s.name}${s.type==='wedding'?'<span class="wtag">💒</span>':''}</div>
            <div class="sdates">${s.dates}</div>
            ${s.accom ? `<div style="font-size:0.68rem;color:#b07d2a;margin:0.1rem 0">🏠 ${s.accom}</div>` : ''}
            <div class="snote">${s.notes}</div>
          </div>
        </div>`;
      }).join('');
  }).join('');
}

function render() { renderRoutes(); renderMarkers(); renderSidebar(); }

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function selectStop(id) {
  activeId = id;
  render();
  setTimeout(() => {
    const c = document.querySelector('.stop-card.active');
    if (c) c.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 40);
}

function showTip(evt, id) {
  const s = stops.find(x=>x.id===id);
  if (!s) return;
  const tip = document.getElementById('tip');
  tip.innerHTML = `<h3>${s.name}</h3><div class="td">${s.dates}</div>${s.accom ? `<p style="font-size:0.68rem;color:var(--gold-light);margin-bottom:0.3rem">🏠 ${s.accom}</p>` : ''}<p>${s.notes}</p><p class="th">Double-click to edit</p>`;
  tip.style.display = 'block';
  const rect = mapWrap.getBoundingClientRect();
  let lx = evt.clientX - rect.left + 14;
  let ly = evt.clientY - rect.top + 14;
  if (lx + 240 > rect.width)  lx = evt.clientX - rect.left - 250;
  if (ly + 180 > rect.height) ly = evt.clientY - rect.top - 190;
  tip.style.left = lx + 'px';
  tip.style.top  = ly + 'px';
}
function hideTip() { document.getElementById('tip').style.display='none'; }

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openEdit(id) {
  const s = stops.find(x=>x.id===id);
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Stop';
  document.getElementById('f-name').value  = s.name;
  document.getElementById('f-dates').value = s.dates;
  document.getElementById('f-type').value  = s.type;
  document.getElementById('f-notes').value = s.notes;
  document.getElementById('del-btn').style.display = 'inline-block';
  document.getElementById('modal-overlay').classList.add('open');
  // Focus the name field after a short delay
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add New Stop';
  document.getElementById('f-name').value  = '';
  document.getElementById('f-dates').value = '';
  document.getElementById('f-type').value  = 'south';
  document.getElementById('f-notes').value = '';
  document.getElementById('del-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function doSave() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name,
    dates: document.getElementById('f-dates').value,
    type:  document.getElementById('f-type').value,
    notes: document.getElementById('f-notes').value,
    lon: editingId ? stops.find(s=>s.id===editingId).lon : 172.0,
    lat: editingId ? stops.find(s=>s.id===editingId).lat : -41.5,
  };
  if (editingId) { const i = stops.findIndex(s=>s.id===editingId); stops[i] = {...stops[i], ...data}; }
  else stops.push({ id: nextId++, ...data });
  closeModal();
  render();
}

function doDelete() {
  if (!editingId) return;
  if (!confirm(`Remove "${stops.find(s=>s.id===editingId)?.name}" from the itinerary?`)) return;
  stops = stops.filter(s => s.id !== editingId);
  if (activeId === editingId) activeId = null;
  closeModal();
  render();
}

// Close on overlay background click
document.getElementById('modal-overlay').addEventListener('mousedown', function(e) {
  if (e.target === this) closeModal();
});

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const { w, h } = sz();
  svg.attr('width', w).attr('height', h);
  projection.translate([w/2, h/2]).scale(Math.min(w,h)*2.2);
  pathGen = d3.geoPath().projection(projection);
  gLand.selectAll('path').attr('d', pathGen);
  render();
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot() {
  initMap();
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    stops = buildStops(rows);
    nextId = stops.length + 1;
  } catch(e) {
    console.warn('Sheet fetch failed:', e);
    stops = [];
  }
  renderSidebar();
  await loadMap();
}
boot();
</script>
</body>
</html>
